name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependency metadata
        run: go mod tidy -diff

      - name: Test
        run: go test -count=1 ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./cmd/sillage

  proto:
    name: Proto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@v1
        with:
          version: 1.71.0

      - name: Lint
        uses: bufbuild/buf-lint-action@v1

      - name: Check breaking changes against pull request base
        if: github.event_name == 'pull_request'
        run: buf breaking --against ".git#branch=${{ github.base_ref }}"

      - name: Check breaking changes against previous main commit
        if: github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000'
        run: buf breaking --against ".git#ref=${{ github.event.before }}"

      - name: Generate
        run: buf generate

      - name: Verify generated files
        run: |
          changes="$(git status --porcelain=v1 --untracked-files=all -- proto/gen)"
          if [ -n "$changes" ]; then
            printf '%s\n' "$changes"
            git diff -- proto/gen
            exit 1
          fi

  web:
    name: Web
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Verify embedded assets
        working-directory: .
        run: |
          test -f server/router/frontend/dist/index.html
          tracked="$(git ls-files -- server/router/frontend/dist)"
          if [ -n "$tracked" ]; then
            printf 'Generated Web assets must not be tracked:\n%s\n' "$tracked"
            exit 1
          fi
          git check-ignore -q server/router/frontend/dist/index.html

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Docker context policy
        run: node scripts/check-docker-context.mjs

      - name: Check Markdown links
        run: node scripts/check-markdown-links.mjs

      - name: Check whitespace
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -n "$BASE_SHA" ] && git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            git diff --check "$BASE_SHA" "$GITHUB_SHA"
          else
            git diff-tree --check --root --no-commit-id -r "$GITHUB_SHA"
          fi

  container:
    name: Container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --build-arg VERSION=ci --build-arg REVISION="$GITHUB_SHA" -t sillage:ci -f scripts/Dockerfile .

      - name: Validate Compose configuration
        run: docker compose -f scripts/compose.yaml config

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install Web dependencies
        run: pnpm --dir web install --frozen-lockfile

      - name: Install browser
        run: pnpm --dir web exec playwright install --with-deps chromium

      - name: Run fresh-instance E2E
        run: |
          pnpm --dir web build
          SILLAGE_DATA="$(mktemp -d)" SILLAGE_ADDR=127.0.0.1 go run ./cmd/sillage > /tmp/sillage.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"; wait "$server_pid" || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:5231/readyz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:5231/readyz >/dev/null
          E2E_FRESH_INSTANCE=1 pnpm --dir web test:e2e

  android:
    name: Android
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Lint
        run: ./gradlew :app:lintDebug

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug
