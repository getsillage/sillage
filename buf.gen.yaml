version: v2
clean: true
managed:
  enabled: true
  disable:
    - file_option: go_package
      module: buf.build/googleapis/googleapis
  override:
    - file_option: go_package_prefix
      value: github.com/getsillage/sillage/proto/gen
plugins:
  - remote: buf.build/protocolbuffers/go:v1.36.11
    out: proto/gen
    opt: paths=source_relative
  - remote: buf.build/grpc/go:v1.6.2
    out: proto/gen
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go:v1.20.0
    out: proto/gen
    opt: paths=source_relative
  - remote: buf.build/grpc-ecosystem/gateway:v2.29.0
    out: proto/gen
    opt: paths=source_relative
  - remote: buf.build/community/google-gnostic-openapi:v0.7.1
    out: proto/gen/openapi
    opt: enum_type=string
