<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>问答 · 设计参考 — Sillage</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
<style>
  body { margin: 0; background: #E7EAE3; color: #23271F;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased; padding: 28px 18px; }
  .caption { max-width: 980px; margin: 0 auto 14px; }
  .caption b { font-weight: 500; }
  .caption span { color: #6E746A; font-size: 13px; }
  .shot { max-width: 980px; margin: 0 auto; border: 0.5px solid #D7DBD2; border-radius: 14px;
    overflow: hidden; box-shadow: 0 8px 30px rgb(35 39 31 / 0.08); }
  i.ti { font-style: normal; }
</style>
</head>
<body>
<div class="caption"><b>问答(记忆问答)</b> &nbsp; <span>设计参考 · 青·纸感 · 真聊天页 · 引用你自己的历史作答</span></div>

<div class="shot">
  <div style="--paper:#F4F6F2; --surface:#FCFCFA; --ink:#23271F; --muted:#6E746A; --faint:#9AA095; --line:#E4E7DF; --accent:#5C8270; --accent-soft:#E7EFE9; --accent-ink:#33533F; --display:'Songti SC','STSong',serif; background:var(--paper); display:flex; min-height:480px;">

    <aside style="width:200px; flex:none; background:var(--surface); border-right:0.5px solid var(--line); padding:20px 15px; display:flex; flex-direction:column;">
      <div style="padding:4px 8px 16px;">
        <div style="font-family:'Palatino','Iowan Old Style',serif; font-style:italic; font-size:22px; color:var(--ink);">Sillage</div>
        <div style="font-family:var(--display); font-size:11px; color:var(--faint); margin-top:3px; letter-spacing:1px;">个人记录</div>
      </div>
      <nav style="display:flex; flex-direction:column; gap:1px;">
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-home" style="font-size:18px"></i>记录</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-route" style="font-size:18px"></i>历史</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-sparkles" style="font-size:18px"></i>总结</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; background:var(--accent-soft); color:var(--accent-ink);"><i class="ti ti-message-circle" style="font-size:18px"></i>问答</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-settings" style="font-size:18px"></i>设置</a>
      </nav>
      <div style="margin-top:15px; padding-top:13px; border-top:0.5px solid var(--line);">
        <div style="font-size:11px; color:var(--faint); letter-spacing:1px; padding:0 10px 7px;">最近的问答</div>
        <a style="display:block; padding:6px 10px; border-radius:7px; font-size:12.5px; color:var(--ink); background:var(--paper); text-decoration:none;">要不要换一座城市</a>
        <a style="display:block; padding:6px 10px; border-radius:7px; font-size:12.5px; color:var(--muted); text-decoration:none;">我和父亲的关系变化</a>
        <a style="display:block; padding:6px 10px; border-radius:7px; font-size:12.5px; color:var(--muted); text-decoration:none;">那几次旅行的共同点</a>
      </div>
      <div style="margin-top:auto; padding:11px 10px 2px; border-top:0.5px solid var(--line); display:flex; align-items:center; justify-content:space-between; color:var(--faint); font-size:12px;">
        <span style="display:flex; align-items:center; gap:7px;"><i class="ti ti-moon" style="font-size:15px"></i>夜间</span>
        <span style="display:flex; align-items:center; gap:7px;"><i class="ti ti-logout" style="font-size:15px"></i>退出</span>
      </div>
    </aside>

    <main style="flex:1; min-width:0; display:flex; flex-direction:column;">
      <div style="flex:1; padding:34px 38px 16px;">
        <div style="max-width:470px; margin:0 auto;">

          <div style="display:flex; justify-content:flex-end; margin-bottom:24px;">
            <div style="max-width:78%; background:var(--surface); border:0.5px solid var(--line); border-radius:14px 14px 4px 14px; padding:11px 15px; font-size:13.5px; color:var(--ink); line-height:1.6;">这半年我好像一直在想"要不要换座城市",帮我理一理。</div>
          </div>

          <div style="display:flex; gap:12px;">
            <div style="flex:none; width:27px; height:27px; border-radius:50%; background:var(--accent-soft); display:flex; align-items:center; justify-content:center; color:var(--accent); margin-top:2px;"><i class="ti ti-sparkles" style="font-size:15px"></i></div>
            <div style="min-width:0;">
              <div style="font-family:var(--display); font-size:15px; color:var(--ink); line-height:1.85;">在你的历史记录里,"换城市"更像是疲惫之后的想法,而不是一个明确目标。几乎每次提起,都紧跟在一段高强度工作之后。</div>
              <div style="margin-top:14px; font-size:11px; color:var(--faint); letter-spacing:0.5px;">引自你的记录</div>
              <div style="margin-top:7px; display:flex; flex-direction:column; gap:6px;">
                <span style="display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--accent-ink); background:var(--accent-soft); border-radius:8px; padding:5px 11px; width:fit-content;"><i class="ti ti-quote" style="font-size:13px"></i>3月12日 · 通勤让我厌倦</span>
                <span style="display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--accent-ink); background:var(--accent-soft); border-radius:8px; padding:5px 11px; width:fit-content;"><i class="ti ti-quote" style="font-size:13px"></i>4月底 · 出差回来后的空</span>
                <span style="display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--accent-ink); background:var(--accent-soft); border-radius:8px; padding:5px 11px; width:fit-content;"><i class="ti ti-quote" style="font-size:13px"></i>上周三 · 又想搬走了</span>
              </div>
              <div style="font-family:var(--display); font-size:15px; color:var(--ink); line-height:1.85; margin-top:14px;">要不要先问问自己:你想离开的,是这座城市,还是那种节奏?</div>
            </div>
          </div>

        </div>
      </div>

      <div style="padding:13px 38px 24px; border-top:0.5px solid var(--line); background:var(--paper);">
        <div style="max-width:470px; margin:0 auto; display:flex; align-items:center; gap:10px; background:var(--surface); border:0.5px solid var(--line); border-radius:12px; padding:9px 9px 9px 16px;">
          <span style="flex:1; font-size:13.5px; color:var(--faint);">继续问……</span>
          <span style="flex:none; width:31px; height:31px; border-radius:8px; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff;"><i class="ti ti-arrow-up" style="font-size:17px"></i></span>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
