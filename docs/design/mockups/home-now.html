<!doctype html>
<html lang="zh-Hans">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>记录 · 设计参考 — Sillage</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css" />
<style>
  body { margin: 0; background: #E7EAE3; color: #23271F;
    font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased; padding: 28px 18px; }
  .caption { max-width: 980px; margin: 0 auto 14px; }
  .caption b { font-weight: 500; }
  .caption span { color: #6E746A; font-size: 13px; }
  .shot { max-width: 980px; margin: 0 auto; border: 0.5px solid #D7DBD2; border-radius: 14px;
    overflow: hidden; box-shadow: 0 8px 30px rgb(35 39 31 / 0.08); }
  i.ti { font-style: normal; }
</style>
</head>
<body>
<div class="caption"><b>记录(首页)</b> &nbsp; <span>设计参考 · 青·纸感 · 静态效果图</span></div>

<div class="shot">
  <div style="--paper:#F4F6F2; --surface:#FCFCFA; --ink:#23271F; --muted:#6E746A; --faint:#9AA095; --line:#E4E7DF; --accent:#5C8270; --accent-soft:#E7EFE9; --accent-ink:#33533F; --warm:#A8794F; --display:'Songti SC','STSong',serif; background:var(--paper); display:flex; min-height:470px;">

    <aside style="width:200px; flex:none; background:var(--surface); border-right:0.5px solid var(--line); padding:20px 15px; display:flex; flex-direction:column;">
      <div style="padding:4px 8px 18px;">
        <div style="font-family:'Palatino','Iowan Old Style',serif; font-style:italic; font-size:22px; color:var(--ink); letter-spacing:0.2px;">Sillage</div>
        <div style="font-family:var(--display); font-size:11px; color:var(--faint); margin-top:3px; letter-spacing:1px;">个人记录</div>
      </div>
      <nav style="display:flex; flex-direction:column; gap:1px;">
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; background:var(--accent-soft); color:var(--accent-ink);"><i class="ti ti-home" style="font-size:18px"></i>记录</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-route" style="font-size:18px"></i>历史</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-sparkles" style="font-size:18px"></i>总结</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-message-circle" style="font-size:18px"></i>问答</a>
        <a style="display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:8px; font-size:14px; text-decoration:none; color:var(--muted);"><i class="ti ti-settings" style="font-size:18px"></i>设置</a>
      </nav>
      <div style="margin-top:auto; padding:11px 10px 2px; border-top:0.5px solid var(--line); display:flex; align-items:center; justify-content:space-between; color:var(--faint); font-size:12px;">
        <span style="display:flex; align-items:center; gap:7px;"><i class="ti ti-moon" style="font-size:15px"></i>夜间</span>
        <span style="display:flex; align-items:center; gap:7px;"><i class="ti ti-logout" style="font-size:15px"></i>退出</span>
      </div>
    </aside>

    <main style="flex:1; min-width:0; padding:34px 38px;">
      <div style="max-width:460px; margin:0 auto;">
        <div style="font-size:12px; color:var(--faint); letter-spacing:0.5px;">2026年6月25日 · 周四</div>
        <div style="font-family:var(--display); font-size:27px; color:var(--ink); margin:8px 0 2px; letter-spacing:0.5px;">今天想记录什么？</div>
        <div style="font-family:'Palatino',serif; font-style:italic; font-size:13px; color:var(--faint); margin-bottom:20px;">写下今天发生的事、想法或感受。</div>

        <div style="background:var(--surface); border:0.5px solid var(--line); border-radius:12px; padding:15px 17px;">
          <div style="font-family:var(--display); font-size:15px; color:var(--faint);">记下记录……</div>
          <div style="display:flex; align-items:center; gap:7px; margin-top:24px;">
            <span style="font-size:12px; color:var(--muted); border:0.5px solid var(--line); border-radius:999px; padding:3px 11px; display:inline-flex; gap:5px; align-items:center;"><i class="ti ti-mood-smile" style="font-size:14px"></i>平静</span>
            <span style="font-size:12px; color:var(--muted); border:0.5px solid var(--line); border-radius:999px; padding:3px 11px; display:inline-flex; gap:5px; align-items:center;"><i class="ti ti-map-pin" style="font-size:14px"></i>地点</span>
            <span style="font-size:12px; color:var(--muted); border:0.5px solid var(--line); border-radius:999px; padding:3px 11px; display:inline-flex; gap:5px; align-items:center;"><i class="ti ti-user" style="font-size:14px"></i>人物</span>
            <span style="margin-left:auto; font-size:12.5px; color:#fff; background:var(--accent); border-radius:999px; padding:6px 17px;">保存</span>
          </div>
        </div>

        <div style="font-family:var(--display); font-size:13px; color:var(--muted); letter-spacing:2px; margin:28px 0 4px;">最近的历史</div>

        <div style="position:relative; padding-left:22px;">
          <div style="position:absolute; left:5px; top:8px; bottom:8px; width:1px; background:var(--line);"></div>

          <div style="position:relative; padding:12px 0;">
            <span style="position:absolute; left:-21px; top:16px; width:9px; height:9px; border-radius:50%; background:var(--paper); border:1.5px solid var(--accent);"></span>
            <div style="font-size:11.5px; color:var(--faint);">08:24</div>
            <div style="font-family:var(--display); font-size:16px; color:var(--ink); margin:2px 0 3px;">晨跑后的城市还没醒</div>
            <div style="font-size:13px; color:var(--muted); line-height:1.6;">沿江边一直跑到桥下,雾把对岸的楼都收走了……</div>
            <div style="margin-top:8px; display:flex; gap:6px;"><span style="font-size:11px; color:var(--accent-ink); background:var(--accent-soft); border-radius:999px; padding:2px 9px;">#晨跑</span><span style="font-size:11px; color:var(--muted); background:var(--paper); border:0.5px solid var(--line); border-radius:999px; padding:2px 9px;">短记录</span></div>
          </div>

          <div style="position:relative; padding:12px 0;">
            <span style="position:absolute; left:-21px; top:16px; width:9px; height:9px; border-radius:50%; background:var(--paper); border:1.5px solid var(--accent);"></span>
            <div style="font-size:11.5px; color:var(--faint);">昨天 22:10</div>
            <div style="font-family:var(--display); font-size:16px; color:var(--ink); margin:2px 0 3px;">关于"专注"的一段笔记</div>
            <div style="display:flex; gap:8px; align-items:flex-start; margin-top:7px; background:var(--accent-soft); border-radius:8px; padding:9px 12px;">
              <i class="ti ti-sparkles" style="font-size:15px; color:var(--accent); margin-top:1px;"></i>
              <span style="font-size:12.5px; color:var(--accent-ink); line-height:1.55;">Sillage 总结:这周你三次写到"专注",多半在清晨。</span>
            </div>
          </div>

          <div style="position:relative; padding:12px 0;">
            <span style="position:absolute; left:-22px; top:16px; width:11px; height:11px; border-radius:50%; background:var(--paper); border:1.5px solid var(--warm);"></span>
            <div style="font-size:11.5px; color:var(--warm); display:flex; align-items:center; gap:5px;"><i class="ti ti-history" style="font-size:13px"></i>那年今日 · 3 年前</div>
            <div style="font-family:var(--display); font-size:16px; color:var(--ink); margin:2px 0 3px;">海边的清晨,第一次看到沙丁鱼群</div>
            <div style="font-size:13px; color:var(--muted); line-height:1.6;">水是凉的,光是新的。那天我们什么都没说。</div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
</body>
</html>
