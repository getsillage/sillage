syntax = "proto3";

package sillage.api.v1;

import "api/v1/common.proto";
import "google/api/annotations.proto";
import "google/protobuf/empty.proto";

// AuthService handles the single-account lifecycle: one-time initialization,
// sign-in/out, and access-token refresh. After initialization, Initialize is
// rejected (no second account).
service AuthService {
  // Bootstrap reports whether the instance has been initialized yet, so the
  // client knows whether to show initialization or sign-in.
  rpc Bootstrap(BootstrapRequest) returns (BootstrapResponse) {
    option (google.api.http) = {get: "/api/v1/auth/bootstrap"};
  }

  rpc Initialize(InitializeRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/initialize"
      body: "*"
    };
  }

  rpc SignIn(SignInRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/signin"
      body: "*"
    };
  }

  rpc Refresh(RefreshRequest) returns (AuthResponse) {
    option (google.api.http) = {
      post: "/api/v1/auth/refresh"
      body: "*"
    };
  }

  rpc SignOut(SignOutRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      post: "/api/v1/auth/signout"
      body: "*"
    };
  }

  rpc Me(MeRequest) returns (MeResponse) {
    option (google.api.http) = {get: "/api/v1/auth/me"};
  }
}

message BootstrapRequest {}

message BootstrapResponse {
  bool initialized = 1;
}

message InitializeRequest {
  string username = 1;
  string display_name = 2;
  string password = 3;
}

message SignInRequest {
  string username = 1;
  string password = 2;
}

message RefreshRequest {}

message SignOutRequest {}

message MeRequest {}

message MeResponse {
  Account account = 1;
}

// AuthResponse carries the account plus a short-lived access token. The refresh
// token is delivered out-of-band as an HttpOnly cookie, not in this message.
message AuthResponse {
  Account account = 1;
  string access_token = 2;
  string expires_at = 3;
}
