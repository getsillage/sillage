syntax = "proto3";

package sillage.api.v1;

import "api/v1/common.proto";
import "google/api/annotations.proto";

// MemoService is the CRUD + lifecycle surface for memos. Updates, deletion,
// favoriting, and archiving carry expected_version for optimistic concurrency;
// a stale version is rejected as a conflict (HTTP 409 / Connect Aborted).
// Creation is idempotent by caller-supplied id, while summary generation only
// writes derived AI data and therefore does not carry expected_version.
service MemoService {
  rpc ListMemos(ListMemosRequest) returns (ListMemosResponse) {
    option (google.api.http) = {get: "/api/v1/memos"};
  }

  rpc CreateMemo(CreateMemoRequest) returns (MemoResponse) {
    option (google.api.http) = {
      post: "/api/v1/memos"
      body: "*"
    };
  }

  rpc GetMemo(GetMemoRequest) returns (MemoResponse) {
    option (google.api.http) = {get: "/api/v1/memos/{id}"};
  }

  rpc UpdateMemo(UpdateMemoRequest) returns (MemoResponse) {
    option (google.api.http) = {
      patch: "/api/v1/memos/{id}"
      body: "*"
    };
  }

  rpc DeleteMemo(DeleteMemoRequest) returns (MemoResponse) {
    option (google.api.http) = {delete: "/api/v1/memos/{id}"};
  }

  rpc SetMemoFavorited(SetMemoFavoritedRequest) returns (MemoResponse) {
    option (google.api.http) = {
      post: "/api/v1/memos/{id}:setFavorited"
      body: "*"
    };
  }

  rpc SetMemoArchived(SetMemoArchivedRequest) returns (MemoResponse) {
    option (google.api.http) = {
      post: "/api/v1/memos/{id}:setArchived"
      body: "*"
    };
  }

  rpc GenerateMemoSummary(GenerateMemoSummaryRequest) returns (GenerateMemoSummaryResponse) {
    option (google.api.http) = {
      post: "/api/v1/memos/{id}:generate-summary"
      body: "*"
    };
  }
}

message ListMemosRequest {
  int32 limit = 1;
  // query, when non-empty, runs a full-text search (FTS5 with a LIKE fallback)
  // instead of returning the recent list.
  string query = 2;
  // archived filters both recent-list and search results before limit is
  // applied. When unset, both current and archived memos are included.
  optional bool archived = 3;
  // cursor continues the reverse-chronological recent list. Search requests
  // ignore it because search results are not paginated.
  string cursor = 4;
  // favorited filters both recent-list and search results before limit is
  // applied. When unset, both favorited and non-favorited memos are included.
  optional bool favorited = 5;
}

message ListMemosResponse {
  repeated Memo memos = 1;
  // next_cursor is empty when the recent list is exhausted and for searches.
  string next_cursor = 2;
}

message CreateMemoRequest {
  // id is client-supplied so creation is idempotent across retries/offline sync.
  string id = 1;
  string content = 2;
  string entry_date = 3;
}

message GetMemoRequest {
  string id = 1;
}

// UpdateMemo applies a partial update guarded by expected_version. Unset
// optional fields are left unchanged.
message UpdateMemoRequest {
  reserved 5;
  reserved "pinned";

  string id = 1;
  int64 expected_version = 2;
  optional string content = 3;
  optional string entry_date = 4;
  optional bool archived = 6;
  optional bool favorited = 7;
}

message DeleteMemoRequest {
  string id = 1;
  int64 expected_version = 2;
}

message SetMemoFavoritedRequest {
  string id = 1;
  int64 expected_version = 2;
  bool favorited = 3;
}

message SetMemoArchivedRequest {
  string id = 1;
  int64 expected_version = 2;
  bool archived = 3;
}

message GenerateMemoSummaryRequest {
  string id = 1;
}

message GenerateMemoSummaryResponse {
  MemoAI ai = 1;
}

message MemoResponse {
  Memo memo = 1;
  // ai carries the memo's latest summary when one exists, so clients can render
  // a stored summary without regenerating it.
  MemoAI ai = 2;
}
