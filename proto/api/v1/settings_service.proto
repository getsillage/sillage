syntax = "proto3";

package sillage.api.v1;

import "api/v1/common.proto";
import "google/api/annotations.proto";

// SettingsService manages AI profiles and account-wide AI behavior. Get never
// returns API keys; Patch replaces the full profile set (api_key omitted = keep
// the stored key), while SetAIAutoSummary never mutates profiles.
service SettingsService {
  rpc GetAISettings(GetAISettingsRequest) returns (AISettingsResponse) {
    option (google.api.http) = {get: "/api/v1/settings/ai"};
  }

  rpc PatchAISettings(PatchAISettingsRequest) returns (AISettingsResponse) {
    option (google.api.http) = {
      patch: "/api/v1/settings/ai"
      body: "*"
    };
  }

  rpc SetAIAutoSummary(SetAIAutoSummaryRequest) returns (SetAIAutoSummaryResponse) {
    option (google.api.http) = {
      post: "/api/v1/settings/ai:setAutoSummary"
      body: "*"
    };
  }
}

message GetAISettingsRequest {}

message PatchAISettingsRequest {
  repeated AIProfileInput profiles = 1;
  // Deprecated for new clients: use SetAIAutoSummary. Kept so older clients can
  // update the global setting while replacing the profile set.
  optional bool auto_summary = 2;
}

message SetAIAutoSummaryRequest {
  bool auto_summary = 1;
}

message SetAIAutoSummaryResponse {
  bool auto_summary = 1;
}

// AIProfileInput is the writable shape of a profile. api_key is optional: unset
// keeps the stored key, empty string clears it.
message AIProfileInput {
  string id = 1;
  string name = 2;
  string provider = 3;
  string base_url = 4;
  string model = 5;
  double temperature = 6;
  int64 max_tokens = 7;
  bool enabled = 8;
  bool active = 9;
  optional string api_key = 10;
  // Deprecated: auto_summary is global on PatchAISettingsRequest.
  bool auto_summary = 11;
}

message AISettingsResponse {
  repeated AIProfile profiles = 1;
  bool auto_summary = 2;
}
