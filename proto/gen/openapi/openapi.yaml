components:
    schemas:
        AIProfile:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                provider:
                    type: string
                    description: |-
                        provider selects the request shape: "anthropic" or any OpenAI-compatible
                         value (default).
                baseUrl:
                    type: string
                model:
                    type: string
                temperature:
                    type: number
                    format: double
                maxTokens:
                    type: string
                enabled:
                    type: boolean
                active:
                    type: boolean
                    description: |-
                        active marks the single profile used for generation. At most one profile
                         is active at a time.
                hasApiKey:
                    type: boolean
                keyUnavailable:
                    type: boolean
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
                autoSummary:
                    type: boolean
                    description: 'Deprecated: auto_summary is now a global AI setting.'
            description: |-
                AIProfile is a user-configured AI provider. The API key is never returned;
                 has_api_key reports whether one is stored and key_unavailable reports that a
                 stored key could not be decrypted (degraded, not fatal).
        AIProfileInput:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                provider:
                    type: string
                baseUrl:
                    type: string
                model:
                    type: string
                temperature:
                    type: number
                    format: double
                maxTokens:
                    type: string
                enabled:
                    type: boolean
                active:
                    type: boolean
                apiKey:
                    type: string
                autoSummary:
                    type: boolean
                    description: 'Deprecated: auto_summary is global on PatchAISettingsRequest.'
            description: |-
                AIProfileInput is the writable shape of a profile. api_key is optional: unset
                 keeps the stored key, empty string clears it.
        AISettingsResponse:
            type: object
            properties:
                profiles:
                    type: array
                    items:
                        $ref: '#/components/schemas/AIProfile'
                autoSummary:
                    type: boolean
        Account:
            type: object
            properties:
                id:
                    type: string
                username:
                    type: string
                displayName:
                    type: string
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
            description: |-
                Account is the single owner of a Sillage instance. The instance allows
                 exactly one account; a second registration is rejected after initialization.
        AskConversation:
            type: object
            properties:
                id:
                    type: string
                title:
                    type: string
                status:
                    type: string
                contextScope:
                    type: string
                    description: |-
                        context_scope is the default time window for grounding: "recent_7_days" |
                         "recent_30_days" | "all". Per-message scope/source may override it.
                headMessageId:
                    type: string
                    description: |-
                        head_message_id is the currently active leaf when forks (regenerations /
                         branches) exist.
                pinnedTime:
                    type: string
                    format: date-time
                archivedTime:
                    type: string
                    format: date-time
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
                deletedTime:
                    type: string
                    format: date-time
            description: |-
                AskConversation is a single Ask thread (a ChatGPT-style conversation grounded
                 in the user's memos).
        AskConversationResponse:
            type: object
            properties:
                conversation:
                    $ref: '#/components/schemas/AskConversation'
        AskMessage:
            type: object
            properties:
                id:
                    type: string
                conversationId:
                    type: string
                role:
                    type: string
                    description: role is "user" | "assistant".
                content:
                    type: string
                parentId:
                    type: string
                    description: parent_id is the message this one follows (empty for the first turn).
                forkOfId:
                    type: string
                    description: |-
                        fork_of_id, when set, marks this as an alternative (regenerated) answer to
                         the same parent as the referenced message.
                status:
                    type: string
                    description: |-
                        status is the message lifecycle marker; persisted messages currently use
                         "complete".
                sourceRefs:
                    type: array
                    items:
                        $ref: '#/components/schemas/AskSourceRef'
                model:
                    type: string
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
                deletedTime:
                    type: string
                    format: date-time
            description: |-
                AskMessage is one turn in a conversation. Branching and regeneration are
                 modeled as a tree: parent_id links a follow-up to the message it answers, and
                 fork_of_id links a regenerated answer to the answer it replaces.
        AskSourceRef:
            type: object
            properties:
                memoId:
                    type: string
                entryDate:
                    type: string
                excerpt:
                    type: string
                rank:
                    type: integer
                    format: int32
            description: |-
                AskSourceRef is a citation: a memo an answer was grounded in, so the user can
                 jump back to the original record.
        Attachment:
            type: object
            properties:
                id:
                    type: string
                uid:
                    type: string
                memoId:
                    type: string
                url:
                    type: string
                filename:
                    type: string
                contentType:
                    type: string
                size:
                    type: string
                sha256:
                    type: string
                width:
                    type: string
                height:
                    type: string
                status:
                    type: string
                    description: status is the lifecycle marker; stored local attachments use "stored".
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
                deletedTime:
                    type: string
                    format: date-time
            description: |-
                Attachment is a file stored alongside a memo. Bytes live on disk; this
                 message carries only metadata. In sync, attachments are pull-only (the
                 server never accepts attachment pushes).
        AttachmentResponse:
            type: object
            properties:
                attachment:
                    $ref: '#/components/schemas/Attachment'
        AuthResponse:
            type: object
            properties:
                account:
                    $ref: '#/components/schemas/Account'
                accessToken:
                    type: string
                expiresAt:
                    type: string
            description: |-
                AuthResponse carries the account plus a short-lived access token. The refresh
                 token is delivered out-of-band as an HttpOnly cookie, not in this message.
        BootstrapResponse:
            type: object
            properties:
                initialized:
                    type: boolean
        CreateAskConversationRequest:
            type: object
            properties:
                title:
                    type: string
                contextScope:
                    type: string
        CreateAskMessageRequest:
            type: object
            properties:
                conversationId:
                    type: string
                content:
                    type: string
                contextScope:
                    type: string
                    description: |-
                        context_scope overrides the conversation's time window for this turn:
                         "recent_7_days" | "recent_30_days" | "all".
                parentId:
                    type: string
                    description: |-
                        parent_id branches a follow-up off a specific message (empty = continue the
                         active head).
                forkOfId:
                    type: string
                    description: |-
                        fork_of_id regenerates an answer: the new assistant message becomes an
                         alternative to the referenced one under the same parent.
                sourceKind:
                    type: string
                    description: |-
                        source_kind selects what the answer is grounded in for this turn:
                         "records" (raw memos, default) | "memo_summary" | "summaries".
        CreateAskMessageResponse:
            type: object
            properties:
                messages:
                    type: array
                    items:
                        $ref: '#/components/schemas/AskMessage'
        CreateMemoRequest:
            type: object
            properties:
                id:
                    type: string
                    description: |-
                        id may be client-supplied so an offline memo keeps the same identity after
                         sync. A duplicate id is not itself an idempotency key.
                content:
                    type: string
                entryDate:
                    type: string
        GenerateMemoSummaryRequest:
            type: object
            properties:
                id:
                    type: string
        GenerateMemoSummaryResponse:
            type: object
            properties:
                ai:
                    $ref: '#/components/schemas/MemoAI'
        GoogleProtobufAny:
            type: object
            properties:
                '@type':
                    type: string
                    description: The type of the serialized message.
            additionalProperties: true
            description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
        InitializeRequest:
            type: object
            properties:
                username:
                    type: string
                displayName:
                    type: string
                password:
                    type: string
        ListAskConversationsResponse:
            type: object
            properties:
                conversations:
                    type: array
                    items:
                        $ref: '#/components/schemas/AskConversation'
        ListAskMessagesResponse:
            type: object
            properties:
                messages:
                    type: array
                    items:
                        $ref: '#/components/schemas/AskMessage'
        ListMemosResponse:
            type: object
            properties:
                memos:
                    type: array
                    items:
                        $ref: '#/components/schemas/Memo'
                nextCursor:
                    type: string
                    description: next_cursor is empty when the recent list is exhausted and for searches.
        MeResponse:
            type: object
            properties:
                account:
                    $ref: '#/components/schemas/Account'
        Memo:
            type: object
            properties:
                id:
                    type: string
                content:
                    type: string
                entryDate:
                    type: string
                    description: |-
                        entry_date is the user-chosen calendar day in YYYY-MM-DD form; it is
                         independent of created_time.
                version:
                    type: string
                    description: |-
                        version is bumped on every content/state mutation and drives optimistic
                         concurrency: writes carry the expected_version they read.
                archivedTime:
                    type: string
                    format: date-time
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
                deletedTime:
                    type: string
                    description: deleted_time set => the memo is tombstoned (soft-deleted).
                    format: date-time
                favoritedAt:
                    type: string
                    format: date-time
            description: |-
                Memo is the only content unit in Sillage (shown as "记录" in the UI).
                 Deletion is a tombstone: deleted_time is set while the row is retained so
                 sync clients can converge.
        MemoAI:
            type: object
            properties:
                memoId:
                    type: string
                summary:
                    type: string
                sentiment:
                    type: string
                provider:
                    type: string
                model:
                    type: string
                profileId:
                    type: string
                promptVersion:
                    type: string
                sourceMemoIds:
                    type: string
                    description: source_memo_ids is a JSON array of the memo IDs the summary is grounded in.
                status:
                    type: string
                    description: |-
                        status is the generation lifecycle marker; successful summaries use
                         "complete".
                errorCode:
                    type: string
                    description: error_code explains a "failed"/degraded status, e.g. "key_unavailable".
                startedTime:
                    type: string
                    format: date-time
                finishedTime:
                    type: string
                    format: date-time
                inputTokens:
                    type: string
                outputTokens:
                    type: string
                totalTokens:
                    type: string
                createdTime:
                    type: string
                    format: date-time
                updatedTime:
                    type: string
                    format: date-time
            description: |-
                MemoAI holds AI-derived data for a memo (currently the summary). It is stored
                 in a separate table and intentionally does NOT bump the memo's version or
                 updated_time, so regenerating a summary never looks like a content edit.
        MemoResponse:
            type: object
            properties:
                memo:
                    $ref: '#/components/schemas/Memo'
                ai:
                    allOf:
                        - $ref: '#/components/schemas/MemoAI'
                    description: |-
                        ai carries the memo's latest summary when one exists, so clients can render
                         a stored summary without regenerating it.
        PatchAISettingsRequest:
            type: object
            properties:
                profiles:
                    type: array
                    items:
                        $ref: '#/components/schemas/AIProfileInput'
                autoSummary:
                    type: boolean
                    description: |-
                        Deprecated for new clients: use SetAIAutoSummary. Kept so older clients can
                         update the global setting while replacing the profile set.
        PullSyncResponse:
            type: object
            properties:
                memos:
                    type: array
                    items:
                        $ref: '#/components/schemas/Memo'
                attachments:
                    type: array
                    items:
                        $ref: '#/components/schemas/Attachment'
                memoAi:
                    type: array
                    items:
                        $ref: '#/components/schemas/MemoAI'
                askConversations:
                    type: array
                    items:
                        $ref: '#/components/schemas/AskConversation'
                askMessages:
                    type: array
                    items:
                        $ref: '#/components/schemas/AskMessage'
                cursor:
                    type: string
                    description: |-
                        cursor and next_cursor are the server position after this page. Clients
                         should persist next_cursor only after applying the returned resources.
                nextCursor:
                    type: string
                hasMore:
                    type: boolean
        PushSyncRequest:
            type: object
            properties:
                changes:
                    type: array
                    items:
                        $ref: '#/components/schemas/SyncChange'
        PushSyncResponse:
            type: object
            properties:
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/SyncResult'
        RefreshRequest:
            type: object
            properties: {}
        SetAIAutoSummaryRequest:
            type: object
            properties:
                autoSummary:
                    type: boolean
        SetAIAutoSummaryResponse:
            type: object
            properties:
                autoSummary:
                    type: boolean
        SetAskConversationArchivedRequest:
            type: object
            properties:
                conversationId:
                    type: string
                archived:
                    type: boolean
        SetMemoArchivedRequest:
            type: object
            properties:
                id:
                    type: string
                expectedVersion:
                    type: string
                archived:
                    type: boolean
        SetMemoFavoritedRequest:
            type: object
            properties:
                id:
                    type: string
                expectedVersion:
                    type: string
                favorited:
                    type: boolean
        SignInRequest:
            type: object
            properties:
                username:
                    type: string
                password:
                    type: string
        SignOutRequest:
            type: object
            properties: {}
        Status:
            type: object
            properties:
                code:
                    type: integer
                    description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
                    format: int32
                message:
                    type: string
                    description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
                details:
                    type: array
                    items:
                        $ref: '#/components/schemas/GoogleProtobufAny'
                    description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
            description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
        SyncChange:
            type: object
            properties:
                mutationId:
                    type: string
                    description: mutation_id is a client-generated unique key used to find a stored result.
                resourceType:
                    type: string
                resourceId:
                    type: string
                action:
                    type: string
                    description: action is "create" | "update" | "delete".
                baseVersion:
                    type: string
                    description: |-
                        base_version is the memo version the client based this change on; used for
                         conflict detection on update/delete.
                localChangedAt:
                    type: string
                memo:
                    $ref: '#/components/schemas/SyncMemoPayload'
            description: |-
                SyncChange is one client mutation. Only resource_type "memo" is accepted on
                 push today.
        SyncMemoPayload:
            type: object
            properties:
                id:
                    type: string
                content:
                    type: string
                entryDate:
                    type: string
                pinned:
                    type: boolean
                    description: Deprecated compatibility alias for clients released before favorites.
                archived:
                    type: boolean
                favorited:
                    type: boolean
        SyncResult:
            type: object
            properties:
                mutationId:
                    type: string
                resourceType:
                    type: string
                resourceId:
                    type: string
                status:
                    type: string
                    description: status is "applied" | "conflict" | "rejected".
                reason:
                    type: string
                    description: reason is a machine code complementing a non-applied status.
                message:
                    type: string
                idempotent:
                    type: boolean
                    description: |-
                        idempotent is true when this mutation_id was already applied and the stored
                         result was replayed.
                resource:
                    allOf:
                        - $ref: '#/components/schemas/Memo'
                    description: resource is the server state after a successful apply.
                serverResource:
                    allOf:
                        - $ref: '#/components/schemas/Memo'
                    description: server_resource is the current server state when status is "conflict".
                clientVersion:
                    type: string
                serverVersion:
                    type: string
            description: SyncResult is the per-change outcome, returned in request order.
        UpdateMemoRequest:
            type: object
            properties:
                id:
                    type: string
                expectedVersion:
                    type: string
                content:
                    type: string
                entryDate:
                    type: string
                archived:
                    type: boolean
                favorited:
                    type: boolean
            description: |-
                UpdateMemo applies a partial update guarded by expected_version. Unset
                 optional fields are left unchanged.
tags:
    - name: AskService
      description: |-
        AskService powers the Ask feature: conversations grounded in the user's
         memos, with branching follow-ups and answer regeneration.
    - name: AttachmentService
      description: |-
        AttachmentService exposes attachment metadata. The bytes are served
         separately at /file/attachments/{uid}/{filename} (auth required).
    - name: AuthService
      description: |-
        AuthService handles the single-account lifecycle: one-time initialization,
         sign-in/out, and access-token refresh. After initialization, Initialize is
         rejected (no second account).
    - name: MemoService
      description: |-
        MemoService is the CRUD + lifecycle surface for memos. Updates, deletion,
         favoriting, and archiving carry expected_version for optimistic concurrency;
         a stale version is rejected as a conflict (HTTP 409 / Connect Aborted).
         Creation may use a caller-supplied id for offline identity. SyncService uses
         mutation_id to correlate retries and replay a previously stored result.
         Summary generation only writes derived AI data and carries no
         expected_version.
    - name: SettingsService
      description: |-
        SettingsService manages AI profiles and account-wide AI behavior. Get never
         returns API keys; Patch replaces the full profile set (api_key omitted = keep
         the stored key), while SetAIAutoSummary never mutates profiles.
    - name: SyncService
      description: |-
        SyncService is the offline-sync surface used by mobile clients. Pull
         streams server changes since a cursor; push applies client mutations with
         stored-result replay and version-based conflict detection.
